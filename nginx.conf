server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/atashtravel;
    index index.html;

    # Global Security Headers (Applied to all non-cached routes by default)
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Health check endpoint (Used by Docker/orchestrators to clear 'unhealthy' status)
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets aggressively
    # Note: Security headers must be duplicated here because Nginx add_header is not additive.
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # SPA-style routing & static file lookup
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 fallback routing
    error_page 404 /index.html;
}
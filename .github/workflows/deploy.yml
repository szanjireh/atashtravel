name: Deploy Atash Travel

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      provision_ssl:
        description: "Issue SSL cert for atashtravel.com (first-time setup only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate HTML
  # ─────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: html-validate "**/*.html" --ignore "node_modules/**"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 2. Prepare Deploy
  # ─────────────────────────────────────────────
  build:
    name: Prepare Deploy
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

  # ─────────────────────────────────────────────
  # 3. Deploy to server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.ATASHTRAVEL_PATH }}
        run: |
          ssh -p 3031 $SERVER_USER@$SERVER_HOST bash -s << 'ENDSSH'
            set -e

            echo "→ Pulling latest configurations using explicit identity..."
            cd ${{ secrets.ATASHTRAVEL_PATH }}
            GIT_SSH_COMMAND="ssh -i ~/.ssh/githubsajad -o StrictHostKeyChecking=accept-new" git pull origin main

            echo "→ Rebuilding Docker Compose services on the host..."
            docker compose build --no-cache

            echo "→ Tearing down any existing stack to free ports..."
            docker compose down --remove-orphans || true

            echo "→ Ensuring talaseen-network exists..."
            docker network inspect talaseen-network >/dev/null 2>&1 || docker network create talaseen-network

            echo "→ Starting / updating container..."
            docker compose up -d --remove-orphans

            # ── SSL provisioning (first-time only) ──────────────────────────
            if [[ "${{ github.event.inputs.provision_ssl }}" == "true" ]]; then
              echo "→ Issuing SSL certificate for atashtravel.com..."

              docker exec talaseen-certbot mkdir -p /var/www/certbot

              docker exec talaseen-certbot certbot certonly \
                --webroot \
                --webroot-path /var/www/certbot \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d atashtravel.com \
                -d www.atashtravel.com

              echo "✓ SSL certificate issued"
            fi
            
            echo "✓ Atash Travel deployed successfully"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          ssh -p 3031 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            echo '=== Docker containers ==='
            docker ps --filter name=atashtravel --format '{{.Names}}: {{.Status}}'
            echo '=== Compose status ==='
            docker compose ps
            echo '=== Local HTTP health check ==='
            curl -I http://localhost/health
            echo '=== Local front-end check ==='
            curl -I http://localhost/
          EOF
name: Deploy Atash Travel

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      provision_ssl:
        description: "Issue SSL cert for atashtravel.com (first-time setup only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate HTML
  # ─────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: html-validate "**/*.html" --ignore "node_modules/**"
        continue-on-error: true   # Don't fail deploy on lint warnings

  # ─────────────────────────────────────────────
  # 2. Build & Push Docker image
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    
    # 🌟 ADDED PERMISSIONS HERE TO ALLOW GHCR PUSHES 🌟
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/atashtravel
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 3. Deploy to server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.ATASHTRAVEL_PATH }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST bash -s << 'ENDSSH'
            set -e

            echo "→ Pulling latest code..."
            cd ${{ secrets.ATASHTRAVEL_PATH }}
            git pull origin main

            echo "→ Logging into GitHub Container Registry..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "→ Pulling latest image..."
            docker compose pull

            echo "→ Starting / updating container..."
            docker compose up -d --remove-orphans

            # ── SSL provisioning (first-time only) ──────────────────────────
            # Triggered manually via workflow_dispatch with provision_ssl=true.
            # Requires DNS for atashtravel.com to already point at this server.
            if [[ "${{ github.event.inputs.provision_ssl }}" == "true" ]]; then
              echo "→ Issuing SSL certificate for atashtravel.com..."

              # Ensure certbot webroot dir exists inside talaseen's certbot volume
              docker exec talaseen-certbot mkdir -p /var/www/certbot

              docker exec talaseen-certbot certbot certonly \
                --webroot \
                --webroot-path /var/www/certbot \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d atashtravel.com \
                -d www.atashtravel.com

              echo "✓ SSL certificate issued"
            fi

            echo "→ Reloading Talaseen nginx..."
            docker exec talaseen-nginx nginx -s reload

            echo "→ Removing unused images..."
            docker image prune -f

            echo "✓ Atash Travel deployed successfully"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=atashtravel --format '{{.Status}}'"
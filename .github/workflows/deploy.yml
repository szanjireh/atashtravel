name: Deploy Atash Travel

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      provision_ssl:
        description: "Force renew/re-provision SSL certificates"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ─────────────────────────────────────────────
  # Deploy to server (Intelligent & Clean)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup SSH Connectivity
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Execute Remote Deployment Commands
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.ATASHTRAVEL_PATH }}
        run: |
          ssh -p 3031 $SERVER_USER@$SERVER_HOST bash -s << 'ENDSSH'
            set -e

            echo "→ Pulling latest repository configurations..."
            cd ${{ secrets.ATASHTRAVEL_PATH }}
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/githubsajad -o StrictHostKeyChecking=accept-new"
            git fetch origin main
            git reset --hard origin/main
            
            # Clean untracked files but carefully protect persistent environment configurations and keys
            git clean -fdx \
              -e certbot/conf \
              -e .env \
              -e .env.production \
              -e apps/web/.env \
              -e apps/web/.env.production

            echo "→ Checking environment variable configuration file..."
            if [ ! -f .env ]; then
              echo "✗ Error: .env configuration file not found. Deploy aborted."
              exit 1
            fi

            echo "→ Verifying Docker core network layer..."
            docker network inspect atashtravel-network >/dev/null 2>&1 || docker network create atashtravel-network

            echo "→ Running zero-downtime microservice orchestration update..."
            docker compose pull
            docker compose up -d --build --remove-orphans

            echo "→ Clearing dangling image layers to preserve server storage assets..."
            docker image prune -f

            echo "→ Allowing cluster services a warm up period to verify status..."
            sleep 5

            # ── Permanent Let's Encrypt Control Routine ──
            if [[ "${{ github.event.inputs.provision_ssl }}" == "true" ]]; then
              echo "→ Requesting / Updating multi-domain certificate package from Let's Encrypt ACME core..."

              docker compose exec -T certbot certbot certonly \
                --webroot \
                --webroot-path /var/www/certbot \
                --non-interactive \
                --agree-tos \
                --force-renewal \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d atashtravel.com \
                -d www.atashtravel.com \
                -d mail.atashtravel.com

              echo "✓ Production Let's Encrypt core security profile updated"
              echo "→ Executing graceful live hot-reload configuration switch on Nginx..."
              docker compose exec -T nginx nginx -s reload
            fi

            echo "✓ Atash Travel platform configuration update deployed completely"
          ENDSSH

      - name: Post-Deployment System Verification
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          sleep 10
          ssh -p 3031 $SERVER_USER@$SERVER_HOST << 'EOF'
            set -e
            echo '=== Running Cluster Nodes ==='
            docker ps --filter name=atashtravel --format '{{.Names}}: {{.Status}}'
            echo '=== Nginx Local Ingress Routing Status ==='
            curl -sf http://localhost/health && echo 'Ingress status: Operational'
            echo '=== Core Application UI Gateway Check ==='
            curl -sf -o /dev/null -w 'Response Code Matrix: %{http_code}\n' http://localhost/
          EOF
name: Deploy Atash Travel

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      provision_ssl:
        description: "Issue SSL cert for atashtravel.com (first-time setup only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate HTML
  # ─────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: html-validate "**/*.html" --ignore "node_modules/**"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 2. Prepare Deploy
  # ─────────────────────────────────────────────
  build:
    name: Prepare Deploy
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

  # ─────────────────────────────────────────────
  # 3. Deploy to server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.ATASHTRAVEL_PATH }}
        run: |
          ssh -p 3031 $SERVER_USER@$SERVER_HOST bash -s << 'ENDSSH'
            set -e

            echo "→ Pulling latest configurations using explicit identity..."
            cd ${{ secrets.ATASHTRAVEL_PATH }}
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/githubsajad -o StrictHostKeyChecking=accept-new"
            git fetch origin main
            git reset --hard origin/main
            # git clean -fd
            git clean -fdx -e certbot/conf


            echo "→ Tearing down any existing stack to free ports..."
            docker compose down --remove-orphans || true

            echo "→ Ensuring talaseen-network exists..."
            docker network inspect talaseen-network >/dev/null 2>&1 || docker network create talaseen-network

            echo "→ Starting / updating containers..."
            docker compose up -d --remove-orphans

            echo "→ Waiting for services to become healthy..."
            sleep 5

            # ── SSL provisioning (idempotent, safe for repeated deployments) ───
            # On first deployment, certbot generated a self-signed cert automatically.
            # This provisioning step replaces it with a real Let's Encrypt certificate.
            # Subsequent deployments skip issuance and only renew if needed.
            if [[ "${{ github.event.inputs.provision_ssl }}" == "true" ]]; then
              echo "→ Provisioning Let's Encrypt certificate for atashtravel.com..."

              # Verify certbot container is running
              if ! docker ps | grep talaseen-certbot >/dev/null; then
                echo "✗ Error: certbot container (talaseen-certbot) is not running"
                exit 1
              fi

              echo "→ Checking for existing certificate..."
              CERT_TYPE=$(docker exec talaseen-certbot /bin/sh /detect-cert-type.sh 2>/dev/null || echo "unknown")
              
              case "$CERT_TYPE" in
                no-cert)
                  echo "  No certificate found - requesting new certificate from Let's Encrypt..."
                  ;;
                self-signed)
                  echo "  Found temporary self-signed certificate - removing before renewal..."
                  docker exec talaseen-certbot rm -rf /etc/letsencrypt/live/atashtravel.com
                  docker exec talaseen-certbot rm -rf /etc/letsencrypt/archive/atashtravel.com
                  docker exec talaseen-certbot rm -rf /etc/letsencrypt/renewal/atashtravel.com.conf
                  echo "  Bootstrap certificate removed safely"
                  ;;
                letsencrypt)
                  echo "  Found valid Let's Encrypt certificate - renewing if near expiration..."
                  docker exec talaseen-certbot certbot renew \
                    --webroot \
                    --webroot-path /var/www/certbot \
                    --non-interactive \
                    --email ${{ secrets.CERTBOT_EMAIL }} \
                    2>&1 | grep -v "^  Cert not yet due for renewal" || true
                  echo "✓ Certificate renewed or verified (idempotent)"
                  echo "→ Reloading nginx..."
                  docker compose exec -T nginx nginx -s reload || true
                  exit 0
                  ;;
                *)
                  echo "  Found certificate of unknown type - skipping to avoid disruption"
                  exit 0
                  ;;
              esac

              # Request certificate if we're still here (no-cert or after removing self-signed)
              echo "→ Creating certbot challenge directories..."
              docker exec talaseen-certbot mkdir -p /var/www/certbot

              echo "→ Requesting certificate from Let's Encrypt..."
              docker exec talaseen-certbot certbot certonly \
                --webroot \
                --webroot-path /var/www/certbot \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d atashtravel.com \
                -d www.atashtravel.com

              echo "✓ Let's Encrypt certificate obtained"
              echo "→ Reloading nginx to activate real certificate..."
              docker compose exec -T nginx nginx -s reload
            else
              echo "ℹ Using existing certificate for deployment"
              echo "  To provision/renew a certificate, re-run with provision_ssl=true"
            fi
            
            echo "✓ Atash Travel deployed successfully"
          ENDSSH

      - name: Verify deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          sleep 10
          ssh -p 3031 $SERVER_USER@$SERVER_HOST << 'EOF'
            set -e
            echo '=== Docker containers ==='
            docker ps --filter name=atashtravel --format '{{.Names}}: {{.Status}}'
            echo '=== Local HTTP health check ==='
            curl -sf http://localhost/health && echo 'health: OK'
            echo '=== Local front-end check ==='
            curl -sf -o /dev/null -w '%{http_code}' http://localhost/ && echo ''
          EOF
name: Deploy Atash Travel

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      provision_ssl:
        description: "Issue SSL cert for atashtravel.com (first-time setup only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate HTML
  # ─────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: html-validate "**/*.html" --ignore "node_modules/**"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 2. Build & Archive Image
  # ─────────────────────────────────────────────
  build:
    name: Build & Archive Image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/atashtravel
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Archive Docker Image Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/atashtravel:latest
          outputs: type=docker,dest=/tmp/atashtravel.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH for Transfer
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Image to Server via SCP
        run: |
          scp -P 3031 /tmp/atashtravel.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/atashtravel.tar

  # ─────────────────────────────────────────────
  # 3. Deploy to server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.ATASHTRAVEL_PATH }}
        run: |
          ssh -p 3031 $SERVER_USER@$SERVER_HOST bash -s << 'ENDSSH'
            set -e

            echo "→ Pulling latest configurations using explicit identity..."
            cd ${{ secrets.ATASHTRAVEL_PATH }}
            GIT_SSH_COMMAND="ssh -i ~/.ssh/githubsajad -o StrictHostKeyChecking=accept-new" git pull origin main

            echo "→ Loading fresh Docker image locally..."
            docker load -i /tmp/atashtravel.tar
            rm -f /tmp/atashtravel.tar

            echo "→ Ensuring talaseen-network exists..."
            docker network inspect talaseen-network >/dev/null 2>&1 || docker network create talaseen-network

            echo "→ Starting / updating container..."
            docker compose up -d --remove-orphans

            # ── SSL provisioning (first-time only) ──────────────────────────
            if [[ "${{ github.event.inputs.provision_ssl }}" == "true" ]]; then
              echo "→ Issuing SSL certificate for atashtravel.com..."

              docker exec talaseen-certbot mkdir -p /var/www/certbot

              docker exec talaseen-certbot certbot certonly \
                --webroot \
                --webroot-path /var/www/certbot \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d atashtravel.com \
                -d www.atashtravel.com

              echo "✓ SSL certificate issued"
            fi
            
            echo "✓ Atash Travel deployed successfully"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          ssh -p 3031 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=atashtravel --format '{{.Status}}'"
version: "3.9"

services:
  atashtravel:
    image: ghcr.io/szanjireh/atashtravel:latest
    container_name: atashtravel
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - talaseen-network
    healthcheck:
      disable: true
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  talaseen-network:
    external: true  # Instructs this repo to connect to the network created by Talaseen
version: "3.9"

services:
  atashtravel:
    image: ghcr.io/YOUR_GITHUB_USERNAME/atashtravel:latest
    container_name: atashtravel
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - talaseen-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  talaseen-network:
    external: true
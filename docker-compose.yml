# ============================================
# ATASH TRAVEL - Development Environment
# Full-Stack Travel Agency Platform
# ============================================

services:
  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: atashtravel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atashtravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atashtravel_password}
      POSTGRES_DB: ${POSTGRES_DB:-atashtravel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - atashtravel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atashtravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Redis Cache
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: atashtravel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - atashtravel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # MinIO Object Storage (S3 Compatible)
  # ------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: atashtravel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - atashtravel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ------------------------------------------
  # Backend API (NestJS)
  # ------------------------------------------
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: atashtravel-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-atashtravel}:${POSTGRES_PASSWORD:-atashtravel_password}@postgres:5432/${POSTGRES_DB:-atashtravel}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${PORT:-4000}:4000"
    networks:
      - atashtravel-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ------------------------------------------
  # Frontend Web (Next.js)
  # ------------------------------------------
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: atashtravel-web
    restart: unless-stopped
    command: ["node", "apps/web/server.js"]
    healthcheck:
      disable: true
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    networks:
      - atashtravel-network
    depends_on:
      - api
    # healthcheck:
    #   test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => process.exit(r.status < 400 ? 0 : 1)).catch(() => process.exit(1))\""]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s

  # ------------------------------------------
  # Certbot (SSL Certificate Management)
  # ------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: talaseen-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/init-certs.sh:/init-certs.sh:ro
      - ./certbot/detect-cert-type.sh:/detect-cert-type.sh:ro
    networks:
      - atashtravel-network
    entrypoint: /bin/sh
    command: /init-certs.sh

  # ------------------------------------------
  # Nginx Reverse Proxy
  # ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: atashtravel-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./legacy:/usr/share/nginx/html/legacy:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - atashtravel-network
    depends_on:
      web:
        condition: service_started  # 👈 CHANGED THIS LINE HERE
      api:
        condition: service_healthy
      # certbot:
      #   condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
# ------------------------------------------
# Docker Volumes
# ------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

# ------------------------------------------
# Docker Networks
# ------------------------------------------
networks:
  atashtravel-network:
    driver: bridge

# ==============================================
# Atash Travel - Nginx Server Configuration
# ==============================================

# HTTP Server
server {
    listen 80;
    server_name atashtravel.com www.atashtravel.com _;
    server_tokens off;

    # Use Docker's embedded DNS resolver for dynamic upstream resolution.
    # This defers hostname resolution to request time (instead of config load time),
    # preventing "host not found in upstream" errors during nginx reload when
    # upstream containers are temporarily unavailable.
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api_upstream api;
    set $web_upstream web;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ACME Challenge (Let's Encrypt verification)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API Backend (NestJS)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Login rate limiting
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=login_limit burst=5 nodelay;
        
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy static site (preserved)
    location /legacy/ {
        alias /usr/share/nginx/html/legacy/;
        try_files $uri $uri/ $uri.html =404;
        
        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        
        # Next.js specific headers
        proxy_buffering off;
    }

    # Static assets from Next.js
    location /_next/static/ {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# HTTPS Server (active when SSL certificates are available)
# NOTE: On first deployment, uses a self-signed certificate (generated by certbot/init-certs.sh)
# To obtain a valid Let's Encrypt certificate, deploy with:
#   github actions workflow_dispatch > provision_ssl = true
# Once real certs are obtained, nginx will automatically use them (same path)
server {
    listen 443 ssl;
    http2 on;
    server_name atashtravel.com www.atashtravel.com;
    server_tokens off;

    # Use Docker's embedded DNS resolver for dynamic upstream resolution.
    # This defers hostname resolution to request time (instead of config load time),
    # preventing "host not found in upstream" errors during nginx reload when
    # upstream containers are temporarily unavailable.
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api_upstream api;
    set $web_upstream web;

    # SSL Configuration (managed by certbot)
    # Paths work with both self-signed (first boot) and Let's Encrypt (production) certs
    ssl_certificate /etc/letsencrypt/live/atashtravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atashtravel.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # HSTS (only on HTTPS)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # API Backend (NestJS)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Login rate limiting
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=login_limit burst=5 nodelay;
        
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy static site (preserved)
    location /legacy/ {
        alias /usr/share/nginx/html/legacy/;
        try_files $uri $uri/ $uri.html =404;
        
        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        
        # Next.js specific headers
        proxy_buffering off;
    }

    # Static assets from Next.js
    location /_next/static/ {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://$web_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# ==============================================
# Atash Travel - Modern Nginx Configuration
# ==============================================

# Global HTTP Server (Handles Redirects, ACME Challenge & Health Checks)
server {
    listen 80;
    listen [::]:80;
    server_name atashtravel.com www.atashtravel.com mail.atashtravel.com;
    server_tokens off;

    # Health check endpoint for container metrics / internal status
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Certbot ACME challenge directory for automated renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enforce global HTTPS redirect for all incoming web requests
    location / {
        return 301 https://$host$request_uri;
    }
}

# Production HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name atashtravel.com www.atashtravel.com mail.atashtravel.com;
    server_tokens off;

    # Docker internal DNS resolver (Mandatory for dynamic variable proxying)
    resolver 127.0.0.11 valid=30s;

    # SSL Configuration (Managed by certbot)
    ssl_certificate /etc/letsencrypt/live/atashtravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atashtravel.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL Protocols & Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # HSTS (Strict Security Enforced on Production)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Shared Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------
    # API Backend (NestJS)
    # ----------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        set $backend "http://api:4000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Strict Login/Register Rate Limiting
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=login_limit burst=5 nodelay;
        
        set $backend "http://api:4000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    

    # ----------------------------------------------
    # Frontend Application (Next.js)
    # ----------------------------------------------
    location / {
        set $frontend "http://web:3000";
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        
        # Disabled buffering to support streaming features / Server Components
        proxy_buffering off;
    }

    # Next.js Built static assets optimization mapping
    location /_next/static/ {
        set $frontend "http://web:3000";
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js Image Optimization Engine mapping
    location /_next/image {
        set $frontend "http://web:3000";
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom Error Mappings
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
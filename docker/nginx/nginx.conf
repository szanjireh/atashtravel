user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

# Optimizes worker core CPU pinning if supported by the kernel
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048; # Doubled for high-concurrency Node/Next.js traffic
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging (Optimized for JSON or standard production debugging)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Basic Performance Tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Keepalive tuning for optimal HTTP/1.1 reuse to backend upstream containers
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    types_hash_max_size 2048;
    
    # Payload limits (Adjust if accepting large file uploads via NestJS)
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # DDoS / Slow Connection Mitigation Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    reset_timedout_connection on;

    # Modern Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5; # Level 5 is the sweet spot between CPU usage and compression size
    gzip_min_length 256; # Don't compress small files that won't benefit
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-javascript
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        application/wasm
        font/font-woff
        font/opentype
        font/otf
        font/truetype
        font/woff
        font/woff2
        image/apple-touch-icon
        image/svg+xml
        image/x-icon
        text/css
        text/javascript
        text/plain
        text/xml;

    # Rate Limiting Zones (10m zone handles ~160,000 unique client states in memory)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Docker DNS Resolver (Moved valid down to 5s to follow container dynamic lifecycle changes)
    resolver 127.0.0.11 valid=5s;
    resolver_timeout 3s;

    # Include virtual host server configs
    include /etc/nginx/conf.d/*.conf;
}